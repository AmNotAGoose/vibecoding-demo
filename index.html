<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>消消乐</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.18);
      --text: #f0eff4;
      --text-muted: #7c7a8e;
      --accent: #a78bfa;
      --accent-glow: rgba(167, 139, 250, 0.25);
      --ai-accent: #fb923c;
      --ai-glow: rgba(251, 146, 60, 0.25);
      --cell-size: 44px;
      --gap: 3px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "DM Sans", "Noto Sans SC", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    #app { display: flex; flex-direction: column; align-items: center; gap: 16px; position: relative; z-index: 1; }
    header { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    h1 { font-family: "DM Mono", "Noto Sans SC", monospace; font-size: 13px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }
    #tagline { font-size: 12px; color: var(--text-muted); letter-spacing: 0.04em; }
    #arena { display: flex; align-items: flex-start; gap: 16px; }
    .side-panel { display: flex; flex-direction: column; align-items: center; gap: 10px; }

    #timer-bar { display: flex; align-items: center; gap: 10px; font-family: "DM Mono", "Noto Sans SC", monospace; }
    #timer-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
    #timer-track { width: 200px; height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; border: 1px solid var(--border); }
    #timer-fill { height: 100%; width: 100%; background: var(--accent); border-radius: 99px; transition: width 1s linear, background 0.4s; }
    #timer-fill.low { background: #f87171; }
    #timer-val { font-family: "DM Mono", "Noto Sans SC", monospace; font-size: 13px; font-weight: 500; color: var(--text); min-width: 3ch; text-align: right; }

    .panel-label { font-family: "DM Mono", "Noto Sans SC", monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; border: 1px solid var(--border); }
    .panel-label.ai-label { color: var(--ai-accent); border-color: rgba(251, 146, 60, 0.3); }
    .panel-label.you-label { color: var(--accent); border-color: rgba(167, 139, 250, 0.3); }
    .score-pill { font-family: "DM Mono", "Noto Sans SC", monospace; font-size: 20px; font-weight: 500; min-width: 5ch; text-align: center; }
    .score-pill.ai-score { color: var(--ai-accent); }
    .score-pill.you-score { color: var(--accent); }

    .board-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 12px; position: relative; }
    .board-wrap.ai-board { border-color: rgba(251, 146, 60, 0.2); }
    .board-wrap.you-board { border-color: rgba(167, 139, 250, 0.2); }
    .grid { display: grid; grid-template-columns: repeat(8, var(--cell-size)); grid-template-rows: repeat(8, var(--cell-size)); gap: var(--gap); }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      border: 1.5px solid transparent;
      background: var(--surface2);
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
      user-select: none;
    }
    .cell:hover { transform: scale(1.07); background: #2a2a38; border-color: var(--border-strong); }
    .cell.selected { border-color: var(--accent); background: rgba(167, 139, 250, 0.12); transform: scale(1.1); box-shadow: 0 0 0 3px var(--accent-glow); }
    .cell.ai-hint-a { border-color: var(--ai-accent); background: rgba(251, 146, 60, 0.1); }
    .cell.ai-hint-b { border-color: var(--ai-accent); background: rgba(251, 146, 60, 0.2); transform: scale(1.08); }
    .cell.matched { animation: pop 0.28s ease forwards; }

    @keyframes pop {
      0%   { transform: scale(1); opacity: 1; }
      40%  { transform: scale(1.25); opacity: 0.6; }
      100% { transform: scale(0); opacity: 0; }
    }

    #leaderboard { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px 14px; display: flex; flex-direction: column; gap: 12px; min-width: 140px; align-self: stretch; }
    #lb-title { font-family: "DM Mono", "Noto Sans SC", monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); text-align: center; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .lb-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); }
    .lb-row.leader { border-color: rgba(255, 215, 0, 0.25); background: rgba(255, 215, 0, 0.04); }
    .lb-rank { font-family: "DM Mono", "Noto Sans SC", monospace; font-size: 11px; color: var(--text-muted); min-width: 14px; }
    .lb-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
    .lb-avatar.ai-av { background: rgba(251, 146, 60, 0.15); color: var(--ai-accent); }
    .lb-avatar.you-av { background: rgba(167, 139, 250, 0.15); color: var(--accent); }
    .lb-name { font-size: 13px; font-weight: 500; flex: 1; }
    .lb-wins { font-family: "DM Mono", "Noto Sans SC", monospace; font-size: 18px; font-weight: 500; }
    .lb-wins.ai-wins { color: var(--ai-accent); }
    .lb-wins.you-wins { color: var(--accent); }
    .lb-divider { font-family: "DM Mono", "Noto Sans SC", monospace; font-size: 10px; color: var(--text-muted); text-align: center; letter-spacing: 0.08em; }

    #bottom { display: flex; align-items: center; gap: 12px; width: 100%; justify-content: space-between; }
    #msg { font-family: "DM Mono", "Noto Sans SC", monospace; font-size: 12px; color: var(--text-muted); letter-spacing: 0.05em; min-height: 16px; flex: 1; }
    #msg.bad { color: #f87171; }
    #msg.good { color: #6ee7b7; }
    .action-btn { font-family: "DM Mono", "Noto Sans SC", monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); background: transparent; border: 1px solid rgba(167, 139, 250, 0.35); border-radius: 8px; padding: 7px 16px; cursor: pointer; transition: background 0.15s, border-color 0.15s; white-space: nowrap; }
    .action-btn:hover { background: rgba(167, 139, 250, 0.1); border-color: var(--accent); }
    .action-btn:active { transform: scale(0.97); }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-bg.show { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 20px;
      padding: 36px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      min-width: 300px;
      max-width: 360px;
      text-align: center;
    }
    .modal-eyebrow { font-family: "DM Mono", "Noto Sans SC", monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
    .modal-title { font-family: "DM Mono", "Noto Sans SC", monospace; font-size: 26px; font-weight: 500; color: var(--text); line-height: 1.1; }
    .modal-title.win { color: var(--accent); }
    .modal-title.lose { color: #f87171; }
    .modal-title.tie { color: var(--ai-accent); }
    .modal-sub { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 4px; }
    .modal-scores { display: flex; gap: 2px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; width: 100%; }
    .modal-stat { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0; gap: 3px; }
    .modal-stat + .modal-stat { border-left: 1px solid var(--border); }
    .modal-stat-label { font-family: "DM Mono", "Noto Sans SC", monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
    .modal-stat-val { font-family: "DM Mono", "Noto Sans SC", monospace; font-size: 20px; font-weight: 500; }
    .modal-stat-val.you { color: var(--accent); }
    .modal-stat-val.ai { color: var(--ai-accent); }
    .modal-primary-btn { font-family: "DM Mono", "Noto Sans SC", monospace; font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bg); background: var(--accent); border: none; border-radius: 10px; padding: 12px 32px; cursor: pointer; transition: opacity 0.15s; width: 100%; margin-top: 4px; }
    .modal-primary-btn:hover { opacity: 0.85; }
    .start-gems { display: flex; gap: 6px; font-size: 22px; margin-bottom: 4px; }
    .rules-list { font-size: 13px; color: var(--text-muted); line-height: 2; list-style: none; }
    .rules-list li::before { content: "·  "; }
  </style>
</head>
<body>
  <div class="modal-bg show" id="start-modal">
    <div class="modal">
      <div class="start-gems">🔴🟠🟡🟢🔵🟣</div>
      <div class="modal-eyebrow">挑战</div>
      <div class="modal-title">消消乐</div>
      <div class="modal-sub">打败AI，你有30秒。</div>
      <ul class="rules-list">
        <li>点击两个相邻宝石进行交换</li>
        <li>消除横排或竖列3个以上</li>
        <li>得分超过AI即可获胜</li>
        <li>AI每隔3至6秒出一步棋</li>
      </ul>
      <button class="modal-primary-btn" onclick="startGame()">开始游戏</button>
    </div>
  </div>

  <div class="modal-bg" id="end-modal">
    <div class="modal">
      <div class="modal-eyebrow" id="end-eyebrow">本局结束</div>
      <div class="modal-title" id="end-title">-</div>
      <div class="modal-sub" id="end-sub"></div>
      <div class="modal-scores">
        <div class="modal-stat">
          <span class="modal-stat-label">你</span>
          <span class="modal-stat-val you" id="end-you-score">0</span>
        </div>
        <div class="modal-stat">
          <span class="modal-stat-label">AI</span>
          <span class="modal-stat-val ai" id="end-ai-score">0</span>
        </div>
      </div>
      <button class="modal-primary-btn" onclick="restartGame()">再来一局</button>
    </div>
  </div>

  <div id="app">
    <header>
      <h1>消消乐</h1>
      <div id="tagline">打败AI · 消除3个或更多</div>
    </header>

    <div id="timer-bar">
      <span id="timer-label">时间</span>
      <div id="timer-track"><div id="timer-fill"></div></div>
      <span id="timer-val">30</span>
    </div>

    <div id="arena">
      <div class="side-panel">
        <div class="panel-label ai-label">AI</div>
        <div class="score-pill ai-score" id="ai-score-val">0</div>
        <div class="board-wrap ai-board">
          <div class="grid" id="ai-grid"></div>
        </div>
      </div>

      <div id="leaderboard">
        <div id="lb-title">排行榜</div>
        <div class="lb-row" id="lb-row-1">
          <span class="lb-rank">#1</span>
          <div class="lb-avatar" id="lb-av-1"></div>
          <span class="lb-name" id="lb-name-1">-</span>
          <span class="lb-wins" id="lb-wins-1">0</span>
        </div>
        <div class="lb-divider">· · ·</div>
        <div class="lb-row" id="lb-row-2">
          <span class="lb-rank">#2</span>
          <div class="lb-avatar" id="lb-av-2"></div>
          <span class="lb-name" id="lb-name-2">-</span>
          <span class="lb-wins" id="lb-wins-2">0</span>
        </div>
      </div>

      <div class="side-panel">
        <div class="panel-label you-label">你</div>
        <div class="score-pill you-score" id="score-val">0</div>
        <div class="board-wrap you-board">
          <div class="grid" id="grid"></div>
        </div>
      </div>
    </div>

    <div id="bottom">
      <div id="msg"></div>
      <button class="action-btn" onclick="restartGame()">新游戏</button>
    </div>
  </div>

  <script>
    const GEMS = ["🔴", "🟠", "🟡", "🟢", "🔵", "🟣"];
    const COLS = 8, ROWS = 8, GAME_TIME = 30;

    let board = [], selected = null, score = 0, busy = false, gameActive = false;
    let aiBoard = [], aiScore = 0, aiBusy = false, aiTimer = null;
    let timeLeft = GAME_TIME, timerInterval = null;
    let wins = { you: 0, ai: 0 };
    let comboCount = 0;

    const AC = new (window.AudioContext || window.webkitAudioContext)();
    function resumeAC() { if (AC.state === "suspended") AC.resume(); }

    function synth({ type, freq, freqEnd, startTime, duration, gainPeak, attack, decay, sustain, release }) {
      resumeAC();
      const osc = AC.createOscillator();
      const gain = AC.createGain();
      osc.connect(gain);
      gain.connect(AC.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, startTime);
      if (freqEnd !== undefined) {
        osc.frequency.exponentialRampToValueAtTime(Math.max(0.001, freqEnd), startTime + duration);
      }
      const rel = release ?? duration * 0.4;
      const a = attack ?? 0.01;
      const d = decay ?? 0.06;
      const s = sustain ?? 0.5;
      const holdTime = Math.max(startTime + a + d, startTime + duration - rel);
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(gainPeak, startTime + a);
      gain.gain.linearRampToValueAtTime(gainPeak * s, startTime + a + d);
      gain.gain.setValueAtTime(gainPeak * s, holdTime);
      gain.gain.linearRampToValueAtTime(0, startTime + duration);
      osc.start(startTime);
      osc.stop(startTime + duration + 0.01);
    }

    function noiseBlip(startTime, duration, gainPeak) {
      resumeAC();
      const frameCount = Math.max(1, Math.floor(AC.sampleRate * duration));
      const buffer = AC.createBuffer(1, frameCount, AC.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < frameCount; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      const src = AC.createBufferSource();
      src.buffer = buffer;
      const filter = AC.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(180, startTime);
      filter.Q.setValueAtTime(1.2, startTime);
      const gain = AC.createGain();
      src.connect(filter);
      filter.connect(gain);
      gain.connect(AC.destination);
      gain.gain.setValueAtTime(gainPeak, startTime);
      gain.gain.linearRampToValueAtTime(0, startTime + duration);
      src.start(startTime);
      src.stop(startTime + duration + 0.01);
    }

    function sndStartJingle() {
      resumeAC();
      const t = AC.currentTime;
      const G = 0.55;

      [0, 0.5, 1.0, 1.5].forEach((off) => {
        synth({
          type: "triangle",
          freq: 80,
          freqEnd: 55,
          startTime: t + off,
          duration: 0.35,
          gainPeak: G * 0.9,
          attack: 0.01,
          decay: 0.08,
          sustain: 0.45
        });
      });

      const arp = [261.63, 329.63, 392, 523.25, 659.26, 783.99, 1046.5, 1318.5];
      arp.forEach((f, i) => {
        synth({
          type: "sawtooth",
          freq: f,
          startTime: t + i * 0.18,
          duration: 0.22,
          gainPeak: G * 0.35,
          attack: 0.005,
          decay: 0.05,
          sustain: 0.4
        });
      });

      [
        { off: 0.0, notes: [261.63, 329.63, 392] },
        { off: 0.5, notes: [349.23, 440, 523.25] },
        { off: 1.0, notes: [392, 493.88, 587.33, 783.99] }
      ].forEach((chord) => {
        chord.notes.forEach((f) => {
          synth({
            type: "square",
            freq: f,
            startTime: t + chord.off,
            duration: 0.38,
            gainPeak: G * 0.22,
            attack: 0.004,
            decay: 0.07,
            sustain: 0.38
          });
        });
      });

      [523.25, 659.26, 783.99, 1046.5].forEach((f, i) => {
        const st = t + 1.5 + i * 0.03;
        synth({
          type: "sine",
          freq: f,
          startTime: st,
          duration: 0.55,
          gainPeak: G * 0.45,
          attack: 0.01,
          decay: 0.08,
          sustain: 0.45
        });
        synth({
          type: "sine",
          freq: f * 1.004,
          startTime: st,
          duration: 0.55,
          gainPeak: G * 0.18,
          attack: 0.01,
          decay: 0.08,
          sustain: 0.45
        });
      });

      [0.25, 0.75, 1.25, 1.75].forEach((off) => {
        noiseBlip(t + off, 0.08, 0.35);
      });
    }

    function sndSelect() {
      resumeAC();
      synth({ type: "sine", freq: 880, freqEnd: 740, startTime: AC.currentTime, duration: 0.08, gainPeak: 0.07, attack: 0.003, decay: 0.03, sustain: 0.35 });
    }

    function sndSwap() {
      resumeAC();
      const t = AC.currentTime;
      synth({ type: "sine", freq: 300, freqEnd: 520, startTime: t, duration: 0.12, gainPeak: 0.09, attack: 0.003, decay: 0.04, sustain: 0.4 });
      synth({ type: "sine", freq: 310, freqEnd: 530, startTime: t, duration: 0.12, gainPeak: 0.08, attack: 0.003, decay: 0.04, sustain: 0.4 });
    }

    function sndNoMatch() {
      resumeAC();
      const t = AC.currentTime;
      synth({ type: "triangle", freq: 120, freqEnd: 60, startTime: t, duration: 0.18, gainPeak: 0.08, attack: 0.005, decay: 0.06, sustain: 0.35 });
      noiseBlip(t, 0.12, 0.06);
    }

    function sndMatch(count) {
      resumeAC();
      const t = AC.currentTime;
      const semis = Math.min(comboCount, 5);
      const base = 523.25 * Math.pow(2, semis / 12);
      const notes = [base, base * Math.pow(2, 4 / 12), base * Math.pow(2, 7 / 12)];
      notes.forEach((f, i) => {
        synth({ type: "sine", freq: f, startTime: t + i * 0.02, duration: 0.22, gainPeak: 0.11, attack: 0.004, decay: 0.05, sustain: 0.42 });
      });
      if (count >= 5) {
        synth({ type: "sine", freq: base * 2, startTime: t + 0.05, duration: 0.22, gainPeak: 0.07, attack: 0.004, decay: 0.05, sustain: 0.42 });
      }
    }

    function sndFall() {
      resumeAC();
      synth({ type: "triangle", freq: 200, freqEnd: 140, startTime: AC.currentTime, duration: 0.1, gainPeak: 0.06, attack: 0.004, decay: 0.03, sustain: 0.35 });
    }

    function sndTick() {
      resumeAC();
      synth({ type: "square", freq: 660, startTime: AC.currentTime, duration: 0.06, gainPeak: 0.05, attack: 0.002, decay: 0.02, sustain: 0.35 });
    }

    function sndWin() {
      resumeAC();
      const t = AC.currentTime;
      [523.25, 659.26, 783.99, 1046.5].forEach((f, i) => {
        synth({ type: "sine", freq: f, startTime: t + i * 0.1, duration: 0.24, gainPeak: 0.13, attack: 0.004, decay: 0.06, sustain: 0.5 });
      });
    }

    function sndLose() {
      resumeAC();
      const t = AC.currentTime;
      [440, 392, 349.23, 293.66].forEach((f, i) => {
        synth({ type: "triangle", freq: f, startTime: t + i * 0.11, duration: 0.24, gainPeak: 0.11, attack: 0.005, decay: 0.07, sustain: 0.42 });
      });
    }

    function sndTie() {
      resumeAC();
      const t = AC.currentTime;
      synth({ type: "sine", freq: 440, startTime: t, duration: 0.18, gainPeak: 0.1, attack: 0.005, decay: 0.05, sustain: 0.4 });
      synth({ type: "sine", freq: 440, startTime: t + 0.25, duration: 0.18, gainPeak: 0.1, attack: 0.005, decay: 0.05, sustain: 0.4 });
    }

    function startGame() {
      sndStartJingle();
      document.getElementById("start-modal").classList.remove("show");
      document.getElementById("end-modal").classList.remove("show");
      score = 0;
      aiScore = 0;
      selected = null;
      busy = false;
      aiBusy = false;
      gameActive = true;
      board = freshBoard();
      aiBoard = freshBoard();
      render();
      renderAI();
      updateScores();
      startTimer();
      scheduleAI();
      setMsg("");
    }

    function restartGame() {
      clearInterval(timerInterval);
      clearTimeout(aiTimer);
      startGame();
    }

    function freshBoard() {
      let b;
      do {
        b = Array.from({ length: ROWS }, () =>
          Array.from({ length: COLS }, () => GEMS[Math.floor(Math.random() * GEMS.length)])
        );
      } while (findMatchesOn(b).length > 0);
      return b;
    }

    function startTimer() {
      timeLeft = GAME_TIME;
      updateTimerUI();
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerUI();
        if (timeLeft <= 8 && timeLeft > 0) sndTick();
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          clearTimeout(aiTimer);
          gameActive = false;
          busy = true;
          setTimeout(showEndModal, 400);
        }
      }, 1000);
    }

    function updateTimerUI() {
      document.getElementById("timer-val").textContent = timeLeft;
      const pct = (timeLeft / GAME_TIME) * 100;
      const fill = document.getElementById("timer-fill");
      fill.style.width = pct + "%";
      fill.classList.toggle("low", timeLeft <= 8);
    }

    function render() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const el = document.createElement("div");
          el.className = "cell";
          el.textContent = board[r][c];
          el.dataset.r = String(r);
          el.dataset.c = String(c);
          if (selected && selected[0] === r && selected[1] === c) el.classList.add("selected");
          el.onclick = () => onCellClick(r, c);
          grid.appendChild(el);
        }
      }
    }

    function getCell(r, c) {
      return document.querySelector(`#grid [data-r="${r}"][data-c="${c}"]`);
    }

    function onCellClick(r, c) {
      if (!gameActive || busy) return;
      if (!selected) {
        sndSelect();
        selected = [r, c];
        render();
        return;
      }
      const [sr, sc] = selected;
      if (sr === r && sc === c) {
        selected = null;
        render();
        return;
      }
      if (Math.abs(sr - r) + Math.abs(sc - c) !== 1) {
        sndSelect();
        selected = [r, c];
        render();
        return;
      }
      selected = null;
      doSwap(sr, sc, r, c);
    }

    async function doSwap(r1, c1, r2, c2) {
      busy = true;
      sndSwap();
      const tmp = board[r1][c1];
      board[r1][c1] = board[r2][c2];
      board[r2][c2] = tmp;
      render();
      if (findMatchesOn(board).length === 0) {
        const rev = board[r1][c1];
        board[r1][c1] = board[r2][c2];
        board[r2][c2] = rev;
        render();
        sndNoMatch();
        setMsg("不匹配", "bad");
        setTimeout(() => setMsg(""), 900);
        busy = false;
        return;
      }
      comboCount = 0;
      await resolveMatchesOn(board, "player");
      comboCount = 0;
      busy = false;
    }

    function renderAI() {
      const grid = document.getElementById("ai-grid");
      grid.innerHTML = "";
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const el = document.createElement("div");
          el.className = "cell";
          el.textContent = aiBoard[r][c];
          el.dataset.r = String(r);
          el.dataset.c = String(c);
          grid.appendChild(el);
        }
      }
    }

    function getAICell(r, c) {
      return document.querySelector(`#ai-grid [data-r="${r}"][data-c="${c}"]`);
    }

    function scheduleAI() {
      if (!gameActive) return;
      aiTimer = setTimeout(() => aiTakeTurn(), 3000 + Math.random() * 3000);
    }

    async function aiTakeTurn() {
      if (!gameActive || aiBusy) return;
      aiBusy = true;
      const move = findBestAIMove();
      if (!move) {
        aiBusy = false;
        scheduleAI();
        return;
      }
      const [[r1, c1], [r2, c2]] = move;
      const a = getAICell(r1, c1);
      const b2 = getAICell(r2, c2);
      if (a && b2) {
        a.classList.add("ai-hint-a");
        b2.classList.add("ai-hint-a");
        await delay(300);
        a.classList.remove("ai-hint-a");
        b2.classList.remove("ai-hint-a");
        a.classList.add("ai-hint-b");
        b2.classList.add("ai-hint-b");
        await delay(250);
      }
      const tmp = aiBoard[r1][c1];
      aiBoard[r1][c1] = aiBoard[r2][c2];
      aiBoard[r2][c2] = tmp;
      renderAI();
      await resolveMatchesOn(aiBoard, "ai");
      aiBusy = false;
      if (gameActive) scheduleAI();
    }

    function findBestAIMove() {
      const candidates = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const dirs = [[0, 1], [1, 0]];
          for (const [dr, dc] of dirs) {
            const nr = r + dr;
            const nc = c + dc;
            if (nr >= ROWS || nc >= COLS) continue;
            const tmp = aiBoard[r][c];
            aiBoard[r][c] = aiBoard[nr][nc];
            aiBoard[nr][nc] = tmp;
            const matches = findMatchesOn(aiBoard);
            aiBoard[nr][nc] = aiBoard[r][c];
            aiBoard[r][c] = tmp;
            if (matches.length > 0) {
              candidates.push([[r, c], [nr, nc], matches.length]);
            }
          }
        }
      }
      candidates.sort((a, b) => b[2] - a[2]);
      return candidates.length ? [candidates[0][0], candidates[0][1]] : null;
    }

    function findMatchesOn(b) {
      const hit = new Set();
      for (let r = 0; r < ROWS; r++) {
        let c = 0;
        while (c < COLS - 2) {
          const gem = b[r][c];
          if (!gem) {
            c++;
            continue;
          }
          let end = c + 1;
          while (end < COLS && b[r][end] === gem) end++;
          if (end - c >= 3) {
            for (let k = c; k < end; k++) hit.add(r * COLS + k);
          }
          c = end;
        }
      }
      for (let c = 0; c < COLS; c++) {
        let r = 0;
        while (r < ROWS - 2) {
          const gem = b[r][c];
          if (!gem) {
            r++;
            continue;
          }
          let end = r + 1;
          while (end < ROWS && b[end][c] === gem) end++;
          if (end - r >= 3) {
            for (let k = r; k < end; k++) hit.add(k * COLS + c);
          }
          r = end;
        }
      }
      return [...hit].map((i) => [Math.floor(i / COLS), i % COLS]);
    }

    async function resolveMatchesOn(b, who) {
      while (true) {
        const matches = findMatchesOn(b);
        if (matches.length === 0) break;
        if (who === "player") {
          score += matches.length * 10;
          updateScores();
          sndMatch(matches.length);
          comboCount++;
        } else {
          aiScore += matches.length * 10;
          updateScores();
        }
        for (const [r, c] of matches) {
          const cell = who === "player" ? getCell(r, c) : getAICell(r, c);
          if (cell) cell.classList.add("matched");
          b[r][c] = null;
        }
        await delay(290);
        gravityOn(b);
        if (who === "player") {
          sndFall();
          render();
        } else {
          renderAI();
        }
        await delay(180);
      }
    }

    function gravityOn(b) {
      for (let c = 0; c < COLS; c++) {
        let empty = ROWS - 1;
        for (let r = ROWS - 1; r >= 0; r--) {
          if (b[r][c] !== null) {
            b[empty][c] = b[r][c];
            empty--;
          }
        }
        while (empty >= 0) {
          b[empty][c] = GEMS[Math.floor(Math.random() * GEMS.length)];
          empty--;
        }
      }
    }

    function showEndModal() {
      document.getElementById("end-you-score").textContent = score;
      document.getElementById("end-ai-score").textContent = aiScore;

      let title = "";
      let cls = "";
      let sub = "";
      if (score > aiScore) {
        title = "你赢了！";
        cls = "win";
        sub = "你这局得分超过了AI。";
        wins.you++;
        sndWin();
      } else if (aiScore > score) {
        title = "AI获胜";
        cls = "lose";
        sub = "AI这次略胜一筹。";
        wins.ai++;
        sndLose();
      } else {
        title = "平局";
        cls = "tie";
        sub = "势均力敌，真厉害。";
        sndTie();
      }

      const endTitle = document.getElementById("end-title");
      endTitle.textContent = title;
      endTitle.className = "modal-title " + cls;
      document.getElementById("end-sub").textContent = sub;
      document.getElementById("end-modal").classList.add("show");
      updateLeaderboard();
    }

    function updateLeaderboard() {
      const entries = [
        { name: "你", wins: wins.you, isYou: true },
        { name: "AI", wins: wins.ai, isYou: false }
      ];
      entries.sort((a, b) => b.wins - a.wins);
      for (let i = 0; i < 2; i++) {
        const row = document.getElementById(`lb-row-${i + 1}`);
        const av = document.getElementById(`lb-av-${i + 1}`);
        const name = document.getElementById(`lb-name-${i + 1}`);
        const winsEl = document.getElementById(`lb-wins-${i + 1}`);
        const e = entries[i];
        av.textContent = e.isYou ? "你" : "AI";
        av.className = "lb-avatar " + (e.isYou ? "you-av" : "ai-av");
        name.textContent = e.name;
        winsEl.textContent = String(e.wins);
        winsEl.className = "lb-wins " + (e.isYou ? "you-wins" : "ai-wins");
        if (i !== 0) row.classList.remove("leader");
      }
      const topRow = document.getElementById("lb-row-1");
      const topName = document.getElementById("lb-name-1");
      if (entries[0].wins > 0) {
        topRow.classList.add("leader");
        topName.innerHTML = entries[0].name + " 👑";
      } else {
        topRow.classList.remove("leader");
        topName.textContent = entries[0].name;
      }
    }

    function updateScores() {
      document.getElementById("score-val").textContent = score;
      document.getElementById("ai-score-val").textContent = aiScore;
    }

    function setMsg(text, cls = "") {
      const el = document.getElementById("msg");
      el.textContent = text;
      el.className = cls;
    }

    function delay(ms) { return new Promise((r) => setTimeout(r, ms)); }

    updateLeaderboard();
  </script>
</body>
</html>
