<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消消乐</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.18);
      --text: #f0eff4;
      --text-muted: #7c7a8e;
      --accent: #a78bfa;
      --accent-glow: rgba(167,139,250,0.25);
      --ai-accent: #fb923c;
      --ai-glow: rgba(251,146,60,0.25);
      --cell-size: clamp(28px, 10.5vw, 44px);
      --gap: 2px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', 'Noto Sans SC', sans-serif;
      min-height: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1rem 0.75rem 2rem;
      touch-action: manipulation;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1100px;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    h1 {
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    #tagline {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    #arena {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      width: 100%;
      justify-content: center;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #timer-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      width: 100%;
      max-width: 340px;
    }

    #timer-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    #timer-track {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #timer-fill {
      height: 100%;
      width: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 1s linear, background 0.4s;
    }

    #timer-fill.low { background: #f87171; }

    #timer-val {
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      min-width: 3ch;
      text-align: right;
    }

    .panel-label {
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    .panel-label.ai-label {
      color: var(--ai-accent);
      border-color: rgba(251,146,60,0.3);
    }

    .panel-label.you-label {
      color: var(--accent);
      border-color: rgba(167,139,250,0.3);
    }

    .score-pill {
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      font-size: 18px;
      font-weight: 500;
      min-width: 4ch;
      text-align: center;
    }

    .score-pill.ai-score { color: var(--ai-accent); }
    .score-pill.you-score { color: var(--accent); }

    .board-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px;
      position: relative;
    }

    .board-wrap.ai-board { border-color: rgba(251,146,60,0.2); }
    .board-wrap.you-board { border-color: rgba(167,139,250,0.2); }

    .grid {
      display: grid;
      grid-template-columns: repeat(8, var(--cell-size));
      grid-template-rows: repeat(8, var(--cell-size));
      gap: var(--gap);
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(13px, 4.5vw, 20px);
      cursor: pointer;
      border: 1.5px solid transparent;
      background: var(--surface2);
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .cell:hover {
      transform: scale(1.07);
      background: #2a2a38;
      border-color: var(--border-strong);
    }

    .cell.selected {
      border-color: var(--accent);
      background: rgba(167,139,250,0.12);
      transform: scale(1.1);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .cell.ai-hint-a {
      border-color: var(--ai-accent);
      background: rgba(251,146,60,0.1);
    }

    .cell.ai-hint-b {
      border-color: var(--ai-accent);
      background: rgba(251,146,60,0.2);
      transform: scale(1.08);
    }

    .cell.matched {
      animation: pop 0.28s ease forwards;
    }

    @keyframes pop {
      0%   { transform: scale(1); opacity: 1; }
      40%  { transform: scale(1.25); opacity: 0.6; }
      100% { transform: scale(0); opacity: 0; }
    }

    #leaderboard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 120px;
      align-self: stretch;
    }

    #lb-title {
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .lb-row.leader {
      border-color: rgba(255,215,0,0.25);
      background: rgba(255,215,0,0.04);
    }

    .lb-rank {
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      font-size: 10px;
      color: var(--text-muted);
      min-width: 14px;
    }

    .lb-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 500;
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
    }

    .lb-avatar.ai-av {
      background: rgba(251,146,60,0.15);
      color: var(--ai-accent);
    }

    .lb-avatar.you-av {
      background: rgba(167,139,250,0.15);
      color: var(--accent);
    }

    .lb-name {
      font-size: 12px;
      font-weight: 500;
      flex: 1;
    }

    .lb-wins {
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      font-size: 16px;
      font-weight: 500;
    }

    .lb-wins.ai-wins { color: var(--ai-accent); }
    .lb-wins.you-wins { color: var(--accent); }

    .lb-divider {
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.08em;
    }

    .lb-crown {
      font-size: 11px;
      margin-left: 2px;
    }

    #bottom {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      justify-content: space-between;
    }

    #msg {
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      min-height: 16px;
      flex: 1;
    }

    #msg.bad { color: #f87171; }
    #msg.good { color: #6ee7b7; }

    .action-btn {
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: transparent;
      border: 1px solid rgba(167,139,250,0.35);
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .action-btn:hover {
      background: rgba(167,139,250,0.1);
      border-color: var(--accent);
    }

    .action-btn:active { transform: scale(0.97); }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,10,15,0.88);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-bg.show { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 20px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 340px;
      text-align: center;
    }

    .modal-eyebrow {
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .modal-title {
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      font-size: 24px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.1;
    }

    .modal-title.win { color: var(--accent); }
    .modal-title.lose { color: #f87171; }
    .modal-title.tie { color: var(--ai-accent); }

    .modal-sub {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2px;
    }

    .modal-scores {
      display: flex;
      gap: 2px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      width: 100%;
    }

    .modal-stat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      gap: 3px;
    }

    .modal-stat + .modal-stat { border-left: 1px solid var(--border); }

    .modal-stat-label {
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .modal-stat-val {
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      font-size: 20px;
      font-weight: 500;
    }

    .modal-stat-val.you { color: var(--accent); }
    .modal-stat-val.ai { color: var(--ai-accent); }

    .modal-primary-btn {
      font-family: 'DM Mono', 'Noto Sans SC', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 14px 32px;
      cursor: pointer;
      transition: opacity 0.15s;
      width: 100%;
      margin-top: 4px;
      -webkit-tap-highlight-color: transparent;
    }

    .modal-primary-btn:hover { opacity: 0.85; }

    .start-gems {
      display: flex;
      gap: 6px;
      font-size: 20px;
      margin-bottom: 2px;
    }

    .rules-list {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 2;
      list-style: none;
      text-align: left;
      width: 100%;
    }

    .rules-list li::before { content: '·  '; }

    #mobile-bar { display: none; }

    @media (max-width: 600px) {
      body { padding: 0.75rem 0.5rem 1.5rem; align-items: flex-start; }
      #app { gap: 10px; }

      #tagline        { display: none; }
      #timer-bar      { display: none; }
      #arena > .side-panel:first-child { display: none; }
      #leaderboard    { display: none; }
      .panel-label, .score-pill { display: none; }

      #arena      { width: 100%; justify-content: center; }
      .side-panel { width: 100%; }
      .board-wrap { width: 100%; }
      .grid       { margin: 0 auto; }

      #mobile-bar {
        display: flex;
        align-items: center;
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 8px 14px;
        gap: 10px;
      }

      .mob-stat {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1px;
        min-width: 44px;
      }

      .mob-label {
        font-family: 'DM Mono', 'Noto Sans SC', monospace;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .mob-val {
        font-family: 'DM Mono', 'Noto Sans SC', monospace;
        font-size: 20px;
        font-weight: 500;
        line-height: 1;
      }

      .mob-val.you-col { color: var(--accent); }
      .mob-val.ai-col  { color: var(--ai-accent); }

      .mob-timer {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 7px;
      }

      #mob-timer-track {
        flex: 1;
        height: 5px;
        background: var(--surface2);
        border-radius: 99px;
        overflow: hidden;
        border: 1px solid var(--border);
      }

      #mob-timer-fill {
        height: 100%;
        width: 100%;
        background: var(--accent);
        border-radius: 99px;
        transition: width 1s linear, background 0.4s;
      }

      #mob-timer-fill.low { background: #f87171; }

      #mob-timer-val {
        font-family: 'DM Mono', 'Noto Sans SC', monospace;
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        min-width: 2ch;
        text-align: right;
      }

      #bottom { padding: 0 2px; }
    }
  </style>
</head>
<body>

<div class="modal-bg show" id="start-modal">
  <div class="modal">
    <div class="start-gems">🔴🟠🟡🟢🔵🟣</div>
    <div class="modal-eyebrow">挑战</div>
    <div class="modal-title">消消乐</div>
    <div class="modal-sub">打败AI，你有30秒。</div>
    <ul class="rules-list">
      <li>点击两个相邻宝石进行交换</li>
      <li>消除横排或竖列3个以上</li>
      <li>得分超过AI即可获胜</li>
      <li>AI每隔3至6秒出一步棋</li>
    </ul>
    <button class="modal-primary-btn" onclick="startGame()">开始游戏</button>
  </div>
</div>

<div class="modal-bg" id="end-modal">
  <div class="modal">
    <div class="modal-eyebrow" id="end-eyebrow">本局结束</div>
    <div class="modal-title" id="end-title">—</div>
    <div class="modal-sub" id="end-sub"></div>
    <div class="modal-scores">
      <div class="modal-stat">
        <span class="modal-stat-label">你</span>
        <span class="modal-stat-val you" id="end-you-score">0</span>
      </div>
      <div class="modal-stat">
        <span class="modal-stat-label">AI</span>
        <span class="modal-stat-val ai" id="end-ai-score">0</span>
      </div>
    </div>
    <button class="modal-primary-btn" onclick="restartGame()">再来一局</button>
  </div>
</div>

<div id="app">

  <header>
    <h1>消消乐</h1>
    <div id="tagline">打败AI · 消除3个或更多</div>
  </header>

  <div id="timer-bar">
    <span id="timer-label">时间</span>
    <div id="timer-track"><div id="timer-fill"></div></div>
    <span id="timer-val">30</span>
  </div>

  <div id="mobile-bar">
    <div class="mob-stat">
      <span class="mob-label">你</span>
      <span class="mob-val you-col" id="mob-you-score">0</span>
    </div>
    <div class="mob-timer">
      <div id="mob-timer-track"><div id="mob-timer-fill"></div></div>
      <span id="mob-timer-val">30</span>
    </div>
    <div class="mob-stat">
      <span class="mob-label">AI</span>
      <span class="mob-val ai-col" id="mob-ai-score">0</span>
    </div>
  </div>

  <div id="arena">

    <div class="side-panel">
      <div class="panel-label ai-label">AI</div>
      <div class="score-pill ai-score" id="ai-score-val">0</div>
      <div class="board-wrap ai-board">
        <div class="grid" id="ai-grid"></div>
      </div>
    </div>

    <div id="leaderboard">
      <div id="lb-title">排行榜</div>
      <div class="lb-row" id="lb-row-1">
        <span class="lb-rank">#1</span>
        <div class="lb-avatar" id="lb-av-1"></div>
        <span class="lb-name" id="lb-name-1">—</span>
        <span class="lb-wins" id="lb-wins-1">0</span>
      </div>
      <div class="lb-divider">· · ·</div>
      <div class="lb-row" id="lb-row-2">
        <span class="lb-rank">#2</span>
        <div class="lb-avatar" id="lb-av-2"></div>
        <span class="lb-name" id="lb-name-2">—</span>
        <span class="lb-wins" id="lb-wins-2">0</span>
      </div>
    </div>

    <div class="side-panel">
      <div class="panel-label you-label">你</div>
      <div class="score-pill you-score" id="score-val">0</div>
      <div class="board-wrap you-board">
        <div class="grid" id="grid"></div>
      </div>
    </div>

  </div>

  <div id="bottom">
    <div id="msg"></div>
    <button class="action-btn" onclick="restartGame()">新游戏</button>
  </div>

</div>

<script>
const GEMS = ['🔴','🟠','🟡','🟢','🔵','🟣'];
const COLS = 8, ROWS = 8, GAME_TIME = 30;

let board = [], selected = null, score = 0, busy = false, gameActive = false;
let aiBoard = [], aiScore = 0, aiBusy = false, aiTimer = null;
let timeLeft = GAME_TIME, timerInterval = null;
let wins = { you: 0, ai: 0 };
let comboCount = 0;

const AC = new (window.AudioContext || window.webkitAudioContext)();
function resumeAC() { if (AC.state === 'suspended') AC.resume(); }

function synth({ type, freq, freqEnd, startTime, duration, gainPeak, attack, decay, sustain, release }) {
  resumeAC();
  const t = startTime ?? AC.currentTime;
  const osc = AC.createOscillator();
  const gain = AC.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  if (freqEnd !== undefined) {
    osc.frequency.exponentialRampToValueAtTime(Math.max(freqEnd, 0.001), t + duration);
  }
  const rel = release ?? duration * 0.4;
  const atk = attack ?? 0.01;
  const dec = decay ?? 0.05;
  const sus = sustain ?? 0.5;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(gainPeak, t + atk);
  gain.gain.linearRampToValueAtTime(gainPeak * sus, t + atk + dec);
  const holdEnd = t + duration - rel;
  if (holdEnd > t + atk + dec) {
    gain.gain.setValueAtTime(gainPeak * sus, holdEnd);
  }
  gain.gain.linearRampToValueAtTime(0, t + duration);
  osc.connect(gain);
  gain.connect(AC.destination);
  osc.start(t);
  osc.stop(t + duration + 0.01);
}

function noiseBlip(startTime, duration, gainPeak) {
  resumeAC();
  const t = startTime;
  const bufferSize = Math.max(1, Math.floor(AC.sampleRate * duration));
  const buffer = AC.createBuffer(1, bufferSize, AC.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource();
  src.buffer = buffer;
  const bp = AC.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 180;
  bp.Q.value = 1.2;
  const gain = AC.createGain();
  gain.gain.setValueAtTime(gainPeak, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  src.connect(bp);
  bp.connect(gain);
  gain.connect(AC.destination);
  src.start(t);
  src.stop(t + duration + 0.02);
}

function sndStartJingle() {
  resumeAC();
  const G = 0.55;
  const t0 = AC.currentTime;

  [0, 0.5, 1.0, 1.5].forEach(off => {
    synth({ type: 'triangle', freq: 80, freqEnd: 55, startTime: t0 + off, duration: 0.35, gainPeak: G * 0.9 });
  });

  const arp = [261.63, 329.63, 392, 523.25, 659.26, 783.99, 1046.5, 1318.5];
  arp.forEach((f, i) => {
    synth({ type: 'sawtooth', freq: f, startTime: t0 + i * 0.18, duration: 0.22, gainPeak: G * 0.35, attack: 0.005, decay: 0.05, sustain: 0.3 });
  });

  function chordSquare(freqs, start, dur) {
    freqs.forEach((f, j) => {
      synth({ type: 'square', freq: f, startTime: start + j * 0.002, duration: dur, gainPeak: (G * 0.22) / freqs.length, attack: 0.01, decay: 0.08, sustain: 0.4 });
    });
  }
  chordSquare([261.63, 329.63, 392], t0, 0.38);
  chordSquare([349.23, 440, 523.25], t0 + 0.5, 0.38);
  chordSquare([392, 493.88, 587.33, 783.99], t0 + 1.0, 0.38);

  const landing = [523.25, 659.26, 783.99, 1046.5];
  landing.forEach((f, i) => {
    const st = t0 + 1.5 + i * 0.03;
    synth({ type: 'sine', freq: f, startTime: st, duration: 0.55, gainPeak: G * 0.45, attack: 0.02, decay: 0.1, sustain: 0.5 });
    synth({ type: 'sine', freq: f * 1.004, startTime: st, duration: 0.55, gainPeak: G * 0.18, attack: 0.02, decay: 0.1, sustain: 0.5 });
  });

  [0.25, 0.75, 1.25, 1.75].forEach(off => {
    noiseBlip(t0 + off, 0.08, 0.35);
  });
}

function sndSelect() {
  resumeAC();
  const t = AC.currentTime;
  synth({ type: 'sine', freq: 880, freqEnd: 740, startTime: t, duration: 0.08, gainPeak: 0.07 });
}

function sndSwap() {
  resumeAC();
  const t = AC.currentTime;
  synth({ type: 'sine', freq: 300, freqEnd: 520, startTime: t, duration: 0.12, gainPeak: 0.06 });
  synth({ type: 'sine', freq: 310, freqEnd: 530, startTime: t, duration: 0.12, gainPeak: 0.055 });
}

function sndNoMatch() {
  resumeAC();
  const t = AC.currentTime;
  synth({ type: 'triangle', freq: 120, freqEnd: 60, startTime: t, duration: 0.15, gainPeak: 0.08 });
  noiseBlip(t, 0.06, 0.06);
}

function sndMatch(count) {
  resumeAC();
  const t = AC.currentTime;
  const base = 523.25 * Math.pow(2, Math.min(comboCount, 5) / 12);
  const third = base * 1.25992;
  const fifth = base * 1.49831;
  [base, third, fifth].forEach((f, i) => {
    synth({ type: 'sine', freq: f, startTime: t + i * 0.02, duration: 0.2, gainPeak: 0.06, attack: 0.005, decay: 0.05, sustain: 0.35 });
  });
  if (count >= 5) {
    synth({ type: 'sine', freq: base * 2, startTime: t + 0.06, duration: 0.15, gainPeak: 0.04, attack: 0.003, decay: 0.04, sustain: 0.2 });
  }
}

function sndFall() {
  resumeAC();
  const t = AC.currentTime;
  synth({ type: 'triangle', freq: 200, freqEnd: 140, startTime: t, duration: 0.1, gainPeak: 0.06 });
}

function sndTick() {
  resumeAC();
  const t = AC.currentTime;
  synth({ type: 'square', freq: 660, startTime: t, duration: 0.06, gainPeak: 0.05, attack: 0.001, decay: 0.02, sustain: 0.3 });
}

function sndWin() {
  resumeAC();
  const notes = [523.25, 659.25, 783.99, 1046.5];
  const t = AC.currentTime;
  notes.forEach((f, i) => {
    synth({ type: 'sine', freq: f, startTime: t + i * 0.1, duration: 0.25, gainPeak: 0.1, attack: 0.01, decay: 0.05, sustain: 0.4 });
  });
}

function sndLose() {
  resumeAC();
  const notes = [440, 392, 349.23, 293.66];
  const t = AC.currentTime;
  notes.forEach((f, i) => {
    synth({ type: 'sine', freq: f, startTime: t + i * 0.11, duration: 0.28, gainPeak: 0.09, attack: 0.01, decay: 0.06, sustain: 0.35 });
  });
}

function sndTie() {
  resumeAC();
  const t = AC.currentTime;
  synth({ type: 'sine', freq: 440, startTime: t, duration: 0.12, gainPeak: 0.08 });
  synth({ type: 'sine', freq: 440, startTime: t + 0.25, duration: 0.12, gainPeak: 0.08 });
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function swapCells(b, r1, c1, r2, c2) {
  const tmp = b[r1][c1];
  b[r1][c1] = b[r2][c2];
  b[r2][c2] = tmp;
}

function findMatchesOn(b) {
  const set = new Set();
  for (let r = 0; r < ROWS; r++) {
    let c = 0;
    while (c < COLS) {
      let len = 1;
      while (c + len < COLS && b[r][c] !== null && b[r][c + len] === b[r][c]) len++;
      if (len >= 3) {
        for (let k = 0; k < len; k++) set.add(r * COLS + c + k);
      }
      c += len;
    }
  }
  for (let c = 0; c < COLS; c++) {
    let r = 0;
    while (r < ROWS) {
      let len = 1;
      while (r + len < ROWS && b[r][c] !== null && b[r + len][c] === b[r][c]) len++;
      if (len >= 3) {
        for (let k = 0; k < len; k++) set.add((r + k) * COLS + c);
      }
      r += len;
    }
  }
  return Array.from(set).map(idx => [Math.floor(idx / COLS), idx % COLS]);
}

function gravityOn(b) {
  for (let c = 0; c < COLS; c++) {
    let write = ROWS - 1;
    for (let read = ROWS - 1; read >= 0; read--) {
      if (b[read][c] !== null) {
        b[write][c] = b[read][c];
        if (write !== read) b[read][c] = null;
        write--;
      }
    }
    for (let r = write; r >= 0; r--) {
      b[r][c] = GEMS[Math.floor(Math.random() * GEMS.length)];
    }
  }
}

function freshBoard() {
  let b;
  do {
    b = [];
    for (let r = 0; r < ROWS; r++) {
      b[r] = [];
      for (let c = 0; c < COLS; c++) {
        b[r][c] = GEMS[Math.floor(Math.random() * GEMS.length)];
      }
    }
  } while (findMatchesOn(b).length > 0);
  return b;
}

async function resolveMatchesOn(b, who) {
  while (true) {
    const matches = findMatchesOn(b);
    if (!matches.length) break;

    if (who === 'player') {
      score += matches.length * 10;
      updateScores();
      sndMatch(matches.length);
      comboCount++;
    } else {
      aiScore += matches.length * 10;
      updateScores();
    }

    for (const [r, c] of matches) {
      const cell = who === 'player' ? getCell(r, c) : getAICell(r, c);
      if (cell) cell.classList.add('matched');
      b[r][c] = null;
    }
    await delay(290);
    gravityOn(b);
    if (who === 'player') {
      sndFall();
      render();
    } else {
      renderAI();
    }
    await delay(180);
  }
}

function findBestAIMove() {
  const candidates = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (c < COLS - 1) {
        swapCells(aiBoard, r, c, r, c + 1);
        const m = findMatchesOn(aiBoard);
        swapCells(aiBoard, r, c, r, c + 1);
        if (m.length) candidates.push({ pair: [[r, c], [r, c + 1]], count: m.length });
      }
      if (r < ROWS - 1) {
        swapCells(aiBoard, r, c, r + 1, c);
        const m = findMatchesOn(aiBoard);
        swapCells(aiBoard, r, c, r + 1, c);
        if (m.length) candidates.push({ pair: [[r, c], [r + 1, c]], count: m.length });
      }
    }
  }
  if (!candidates.length) return null;
  candidates.sort((a, b) => b.count - a.count);
  return candidates[0].pair;
}

function scheduleAI() {
  if (!gameActive) return;
  aiTimer = setTimeout(() => { aiTakeTurn(); }, 3000 + Math.random() * 3000);
}

async function aiTakeTurn() {
  if (!gameActive || aiBusy) return;
  aiBusy = true;
  const move = findBestAIMove();
  if (!move) {
    aiBusy = false;
    scheduleAI();
    return;
  }
  const [[ar, ac], [br, bc]] = move;
  const cellA = getAICell(ar, ac);
  const cellB = getAICell(br, bc);
  if (cellA) cellA.classList.add('ai-hint-a');
  if (cellB) cellB.classList.add('ai-hint-a');
  await delay(300);
  if (cellA) { cellA.classList.remove('ai-hint-a'); cellA.classList.add('ai-hint-b'); }
  if (cellB) { cellB.classList.remove('ai-hint-a'); cellB.classList.add('ai-hint-b'); }
  await delay(250);
  if (cellA) cellA.classList.remove('ai-hint-b');
  if (cellB) cellB.classList.remove('ai-hint-b');

  swapCells(aiBoard, ar, ac, br, bc);
  renderAI();
  await resolveMatchesOn(aiBoard, 'ai');
  aiBusy = false;
  if (gameActive) scheduleAI();
}

function getCell(r, c) {
  return document.querySelector(`#grid [data-r="${r}"][data-c="${c}"]`);
}

function getAICell(r, c) {
  return document.querySelector(`#ai-grid [data-r="${r}"][data-c="${c}"]`);
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const div = document.createElement('div');
      div.className = 'cell' + (selected && selected[0] === r && selected[1] === c ? ' selected' : '');
      div.textContent = board[r][c] ?? '';
      div.dataset.r = r;
      div.dataset.c = c;
      div.onclick = () => onCellClick(r, c);
      grid.appendChild(div);
    }
  }
}

function renderAI() {
  const grid = document.getElementById('ai-grid');
  grid.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const div = document.createElement('div');
      div.className = 'cell';
      div.textContent = aiBoard[r][c] ?? '';
      div.dataset.r = r;
      div.dataset.c = c;
      grid.appendChild(div);
    }
  }
}

function onCellClick(r, c) {
  if (!gameActive || busy) return;
  if (!selected) {
    sndSelect();
    selected = [r, c];
    render();
    return;
  }
  const [sr, sc] = selected;
  if (sr === r && sc === c) {
    selected = null;
    render();
    return;
  }
  if (Math.abs(sr - r) + Math.abs(sc - c) !== 1) {
    sndSelect();
    selected = [r, c];
    render();
    return;
  }
  selected = null;
  doSwap(sr, sc, r, c);
}

async function doSwap(r1, c1, r2, c2) {
  busy = true;
  sndSwap();
  swapCells(board, r1, c1, r2, c2);
  render();
  if (!findMatchesOn(board).length) {
    swapCells(board, r1, c1, r2, c2);
    render();
    sndNoMatch();
    setMsg('不匹配', 'bad');
    setTimeout(() => { setMsg(''); busy = false; }, 900);
    return;
  }
  comboCount = 0;
  await resolveMatchesOn(board, 'player');
  comboCount = 0;
  if (gameActive) busy = false;
}

function updateScores() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('ai-score-val').textContent = aiScore;
  const my = document.getElementById('mob-you-score');
  const ma = document.getElementById('mob-ai-score');
  if (my) my.textContent = score;
  if (ma) ma.textContent = aiScore;
}

function setMsg(text, cls = '') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = cls;
}

function updateTimerUI() {
  const pct = (timeLeft / GAME_TIME) * 100;
  document.getElementById('timer-val').textContent = timeLeft;
  const fill = document.getElementById('timer-fill');
  fill.style.width = pct + '%';
  fill.classList.toggle('low', timeLeft <= 8);
  const mf = document.getElementById('mob-timer-fill');
  const mv = document.getElementById('mob-timer-val');
  if (mf) { mf.style.width = pct + '%'; mf.classList.toggle('low', timeLeft <= 8); }
  if (mv) mv.textContent = timeLeft;
}

function startTimer() {
  timeLeft = GAME_TIME;
  updateTimerUI();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 8 && timeLeft > 0) sndTick();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      if (aiTimer) { clearTimeout(aiTimer); aiTimer = null; }
      gameActive = false;
      busy = true;
      setTimeout(showEndModal, 400);
    }
  }, 1000);
}

function updateLeaderboard() {
  const entries = [
    { name: '你', wins: wins.you, who: 'you' },
    { name: 'AI', wins: wins.ai, who: 'ai' }
  ].sort((a, b) => b.wins - a.wins);

  for (let i = 0; i < 2; i++) {
    const e = entries[i];
    const row = document.getElementById('lb-row-' + (i + 1));
    const av = document.getElementById('lb-av-' + (i + 1));
    const nameEl = document.getElementById('lb-name-' + (i + 1));
    const wEl = document.getElementById('lb-wins-' + (i + 1));

    av.textContent = e.who === 'you' ? '你' : 'AI';
    av.className = 'lb-avatar ' + (e.who === 'you' ? 'you-av' : 'ai-av');
    wEl.textContent = e.wins;
    wEl.className = 'lb-wins ' + (e.who === 'you' ? 'you-wins' : 'ai-wins');

    if (entries[0].wins > 0 && i === 0) {
      row.classList.add('leader');
      nameEl.innerHTML = e.name + '<span class="lb-crown">👑</span>';
    } else {
      row.classList.remove('leader');
      nameEl.textContent = e.name;
    }
  }
}

function showEndModal() {
  document.getElementById('end-you-score').textContent = score;
  document.getElementById('end-ai-score').textContent = aiScore;

  const title = document.getElementById('end-title');
  const sub = document.getElementById('end-sub');
  title.classList.remove('win', 'lose', 'tie');

  if (score > aiScore) {
    wins.you++;
    sndWin();
    title.textContent = '你赢了！';
    title.classList.add('win');
    sub.textContent = '你这局得分超过了AI。';
  } else if (aiScore > score) {
    wins.ai++;
    sndLose();
    title.textContent = 'AI获胜';
    title.classList.add('lose');
    sub.textContent = 'AI这次略胜一筹。';
  } else {
    sndTie();
    title.textContent = '平局';
    title.classList.add('tie');
    sub.textContent = '势均力敌，真厉害。';
  }

  document.getElementById('end-modal').classList.add('show');
  updateLeaderboard();
}

function startGame() {
  sndStartJingle();
  document.getElementById('start-modal').classList.remove('show');
  document.getElementById('end-modal').classList.remove('show');

  score = 0;
  aiScore = 0;
  selected = null;
  busy = false;
  aiBusy = false;
  gameActive = true;

  board = freshBoard();
  aiBoard = freshBoard();

  render();
  renderAI();
  updateScores();
  startTimer();
  scheduleAI();
  setMsg('');
}

function restartGame() {
  clearInterval(timerInterval);
  timerInterval = null;
  if (aiTimer) { clearTimeout(aiTimer); aiTimer = null; }
  startGame();
}

updateLeaderboard();
</script>
