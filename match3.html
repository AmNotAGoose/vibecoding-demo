<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
    <title>消除三连</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0f0f13;
        --surface: #1a1a22;
        --surface2: #22222e;
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.18);
        --text: #f0eff4;
        --text-muted: #7c7a8e;
        --accent: #a78bfa;
        --accent-glow: rgba(167,139,250,0.25);
        --cell-size: 52px;
        --gap: 4px;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Sans', 'Noto Sans SC', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      #wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        position: relative;
        z-index: 1;
      }

      header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      h1 {
        font-family: 'DM Mono', 'Noto Sans SC', monospace;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      #tagline {
        font-size: 12px;
        color: var(--text-muted);
        letter-spacing: 0.04em;
      }

      #stats {
        display: flex;
        gap: 2px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      .stat {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px 28px;
        gap: 2px;
      }

      .stat + .stat {
        border-left: 1px solid var(--border);
      }

      .stat-label {
        font-family: 'DM Mono', 'Noto Sans SC', monospace;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .stat-value {
        font-family: 'DM Mono', 'Noto Sans SC', monospace;
        font-size: 22px;
        font-weight: 500;
        color: var(--text);
        line-height: 1;
        min-width: 3ch;
        text-align: center;
      }

      #score-val {
        color: var(--accent);
      }

      #board-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px;
        position: relative;
      }

      #grid {
        display: grid;
        grid-template-columns: repeat(8, var(--cell-size));
        grid-template-rows: repeat(8, var(--cell-size));
        gap: var(--gap);
      }

      .cell {
        width: var(--cell-size);
        height: var(--cell-size);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        cursor: pointer;
        border: 1.5px solid transparent;
        background: var(--surface2);
        transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
        user-select: none;
        position: relative;
      }

      .cell:hover {
        transform: scale(1.07);
        background: #2a2a38;
        border-color: var(--border-strong);
      }

      .cell.selected {
        border-color: var(--accent);
        background: rgba(167,139,250,0.12);
        transform: scale(1.1);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .cell.matched {
        animation: pop 0.28s ease forwards;
      }

      @keyframes pop {
        0%   { transform: scale(1); opacity: 1; }
        40%  { transform: scale(1.25); opacity: 0.6; }
        100% { transform: scale(0); opacity: 0; }
      }

      .cell.falling {
        animation: fall 0.2s cubic-bezier(0.22, 1, 0.36, 1);
      }

      @keyframes fall {
        from { transform: translateY(calc(-1 * var(--cell-size))); opacity: 0.7; }
        to   { transform: translateY(0); opacity: 1; }
      }

      #bottom {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        justify-content: space-between;
      }

      #msg {
        font-family: 'DM Mono', 'Noto Sans SC', monospace;
        font-size: 12px;
        color: var(--text-muted);
        letter-spacing: 0.05em;
        min-height: 16px;
        flex: 1;
      }

      #msg.bad {
        color: #f87171;
      }

      #msg.good {
        color: #6ee7b7;
      }

      #new-btn {
        font-family: 'DM Mono', 'Noto Sans SC', monospace;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent);
        background: transparent;
        border: 1px solid rgba(167,139,250,0.35);
        border-radius: 8px;
        padding: 7px 16px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        white-space: nowrap;
      }

      #new-btn:hover {
        background: rgba(167,139,250,0.1);
        border-color: var(--accent);
      }

      #new-btn:active {
        transform: scale(0.97);
      }

      #overlay {
        display: none;
        position: absolute;
        inset: 0;
        border-radius: 15px;
        background: rgba(15,15,19,0.88);
        backdrop-filter: blur(4px);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        z-index: 10;
      }

      #overlay.show {
        display: flex;
      }

      #overlay-title {
        font-family: 'DM Mono', 'Noto Sans SC', monospace;
        font-size: 13px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
      }

      #overlay-score {
        font-family: 'DM Mono', monospace;
        font-size: 42px;
        font-weight: 500;
        color: var(--text);
        line-height: 1;
      }

      #overlay-sub {
        font-family: 'DM Mono', 'Noto Sans SC', monospace;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .overlay-btn {
        font-family: 'DM Mono', 'Noto Sans SC', monospace;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--bg);
        background: var(--accent);
        border: none;
        border-radius: 8px;
        padding: 10px 24px;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      .overlay-btn:hover {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div id="wrap">

      <header>
        <h1>消除三连</h1>
        <div id="tagline">交换相邻宝石 · 消除三个或更多</div>
      </header>

      <div id="stats">
        <div class="stat">
          <span class="stat-label">分数</span>
          <span class="stat-value" id="score-val">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">步数</span>
          <span class="stat-value" id="moves-val">30</span>
        </div>
      </div>

      <div id="board-wrap">
        <div id="grid"></div>
        <div id="overlay">
          <div id="overlay-title">游戏结束</div>
          <div id="overlay-score">0</div>
          <div id="overlay-sub">最终得分</div>
          <button class="overlay-btn" onclick="initGame()">再玩一次</button>
        </div>
      </div>

      <div id="bottom">
        <div id="msg"></div>
        <button id="new-btn" onclick="initGame()">新游戏</button>
      </div>

    </div>

    <script>
      const GEMS = ['🔴','🟠','🟡','🟢','🔵','🟣'];
      const COLS = 8, ROWS = 8;
      let board = [], selected = null, score = 0, moves = 30, busy = false;

      function initGame() {
        score = 0;
        moves = 30;
        selected = null;
        busy = false;

        document.getElementById('overlay').classList.remove('show');

        do {
          board = Array.from(
            {length: ROWS},
            () => Array.from(
              {length: COLS},
              () => GEMS[Math.floor(Math.random() * GEMS.length)]
            )
          );
        } while (findMatches().length > 0);

        render();
        updateInfo();
        setMsg('');
      }

      function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.textContent = board[r][c];
            cell.dataset.r = r;
            cell.dataset.c = c;
            cell.onclick = () => onCellClick(r, c);

            if (selected !== null && selected[0] === r && selected[1] === c) {
              cell.classList.add('selected');
            }

            grid.appendChild(cell);
          }
        }
      }

      function getCell(r, c) {
        return document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
      }

      function onCellClick(r, c) {
        if (busy || moves <= 0) return;

        if (selected === null) {
          selected = [r, c];
          render();
          return;
        }

        const [sr, sc] = selected;

        if (sr === r && sc === c) {
          selected = null;
          render();
          return;
        }

        const dist = Math.abs(sr - r) + Math.abs(sc - c);
        if (dist !== 1) {
          selected = [r, c];
          render();
          return;
        }

        selected = null;
        doSwap(sr, sc, r, c);
      }

      async function doSwap(r1, c1, r2, c2) {
        busy = true;

        [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
        render();

        const matches = findMatches();
        if (matches.length === 0) {
          [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
          render();
          setMsg('无法匹配', 'bad');
          setTimeout(() => setMsg(''), 900);
          busy = false;
          return;
        }

        moves -= 1;
        updateInfo();
        await resolveMatches();
        busy = false;

        if (moves <= 0) endGame();
      }

      function findMatches() {
        const hit = new Set();

        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS - 2; c++) {
            if (
              board[r][c] &&
              board[r][c] === board[r][c + 1] &&
              board[r][c] === board[r][c + 2]
            ) {
              let l = 3;
              while (c + l < COLS && board[r][c + l] === board[r][c]) l++;
              for (let k = 0; k < l; k++) hit.add(r * COLS + (c + k));
            }
          }
        }

        for (let c = 0; c < COLS; c++) {
          for (let r = 0; r < ROWS - 2; r++) {
            if (
              board[r][c] &&
              board[r][c] === board[r + 1][c] &&
              board[r][c] === board[r + 2][c]
            ) {
              let l = 3;
              while (r + l < ROWS && board[r + l][c] === board[r][c]) l++;
              for (let k = 0; k < l; k++) hit.add((r + k) * COLS + c);
            }
          }
        }

        return Array.from(hit).map(i => [Math.floor(i / COLS), i % COLS]);
      }

      async function resolveMatches() {
        while (true) {
          const matches = findMatches();
          if (matches.length === 0) break;

          score += matches.length * 10;
          updateInfo();

          for (const [r, c] of matches) {
            const el = getCell(r, c);
            el.classList.add('matched');
            board[r][c] = null;
          }

          await delay(290);
          gravity();
          render();
          await delay(210);
        }
      }

      function gravity() {
        for (let c = 0; c < COLS; c++) {
          let empty = ROWS - 1;

          for (let r = ROWS - 1; r >= 0; r--) {
            if (board[r][c] !== null) {
              board[empty][c] = board[r][c];
              if (empty !== r) board[r][c] = null;
              empty--;
            }
          }

          for (let r = 0; r <= empty; r++) {
            board[r][c] = GEMS[Math.floor(Math.random() * GEMS.length)];
          }
        }
      }

      function endGame() {
        const overlay = document.getElementById('overlay');
        document.getElementById('overlay-score').textContent = score;
        overlay.classList.add('show');
      }

      function updateInfo() {
        document.getElementById('score-val').textContent = score;
        document.getElementById('moves-val').textContent = moves;
      }

      function setMsg(text, cls = '') {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className = cls;
      }

      function delay(ms) {
        return new Promise(r => setTimeout(r, ms));
      }

      initGame();
    </script>
  </body>
</html>
